<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボタンで止めるスロットゲーム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        h1 {
            margin-bottom: 20px;
        }

        .slot-machine {
            background-color: #34495e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 4px solid #f1c40f;
            text-align: center;
        }

        /* リールとストップボタンを縦に並べる列 */
        .reel-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .reels-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .reel {
            width: 80px;
            height: 100px;
            background-color: #fff;
            color: #333;
            font-size: 3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            border: 3px solid #bdc3c7;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        /* ボタンの基本スタイル */
        button {
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.1s;
        }

        button:active {
            transform: translateY(2px);
        }

        button:disabled {
            background-color: #7f8c8d !important;
            box-shadow: 0 3px #95a5a6 !important;
            cursor: not-allowed;
            transform: none;
        }

        /* スピンボタン */
        #spin-btn {
            padding: 12px 50px;
            font-size: 1.2rem;
            background-color: #e74c3c;
            color: white;
            box-shadow: 0 5px #c0392b;
            margin-bottom: 10px;
        }

        #spin-btn:active {
            box-shadow: 0 2px #c0392b;
        }

        /* ストップボタン */
        .stop-btn {
            padding: 8px 20px;
            font-size: 1rem;
            background-color: #3498db;
            color: white;
            box-shadow: 0 4px #2980b9;
        }

        .stop-btn:active {
            box-shadow: 0 1px #2980b9;
        }

        #message {
            margin-top: 20px;
            font-size: 1.5rem;
            height: 2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>SLOT MACHINE</h1>

    <div class="slot-machine">
        <div class="reels-container">
            <div class="reel-col">
                <div id="reel1" class="reel">🍒</div>
                <button id="stop1" class="stop-btn" disabled>STOP</button>
            </div>
            <div class="reel-col">
                <div id="reel2" class="reel">🔔</div>
                <button id="stop2" class="stop-btn" disabled>STOP</button>
            </div>
            <div class="reel-col">
                <div id="reel3" class="reel">7️⃣</div>
                <button id="stop3" class="stop-btn" disabled>STOP</button>
            </div>
        </div>
        
        <button id="spin-btn">SPIN!</button>
        
        <div id="message"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
